<!-- File: index.html (محدث) -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>أذكار المسلم · تطبيق الأذكار اليومي</title>
  <!-- Google Fonts (خط عربي عصري) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (أيقونات احترافية) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- ملف التنسيقات الرئيسي -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- التطبيق الرئيسي -->
  <div id="app" class="app-container">

    <!-- الهيدر مع الثيم والعنوان -->
    <header class="main-header">
      <div class="logo-area">
        <i class="fas fa-mosque header-icon"></i>
        <h1>أذكار المسلم</h1>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="تبديل الوضع الليلي">
        <i class="fas fa-moon"></i>
      </button>
    </header>

    <!-- شريط البحث العام -->
    <div class="search-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="globalSearch" class="global-search" placeholder="ابحث في الأذكار و الأدعية..." autocomplete="off">
    </div>

    <!-- منطقة المحتوى الرئيسي (يتم تبديل الأقسام ديناميكياً) -->
    <main id="mainContent" class="main-content">
      <!-- الصفحة الرئيسية -->
      <section id="homeSection" class="content-section active-section">
        <div class="welcome-card">
          <h2>حصنك اليومي</h2>
          <p>أذكار الصباح والمساء، أدعية مباركة، وسبحة إلكترونية</p>
        </div>
        <div class="home-grid">
          <!-- تعديل data-section لتطابق أرقام الأقسام الصحيحة -->
          <div class="home-card" data-section="azkarMorningSection">
            <i class="fas fa-sun"></i>
            <span>أذكار الصباح</span>
          </div>
          <div class="home-card" data-section="azkarEveningSection">
            <i class="fas fa-moon"></i>
            <span>أذكار المساء</span>
          </div>
          <div class="home-card" data-section="duaSection">
            <i class="fas fa-hand-praying"></i>
            <span>الأدعية الجامعة</span>
          </div>
          <div class="home-card" data-section="dailyWirdSection">
            <i class="fas fa-book-open"></i>
            <span>الورد اليومي</span>
          </div>
          <div class="home-card" data-section="tasbeehSection">
            <i class="fas fa-dharmachakra"></i>
            <span>المسبحة الإلكترونية</span>
          </div>
        </div>
      </section>

      <!-- أذكار الصباح -->
      <section id="azkarMorningSection" class="content-section">
        <div class="section-header">
          <h2><i class="fas fa-sun"></i> أذكار الصباح</h2>
        </div>
        <div class="azkar-container" id="morningContainer"></div>
      </section>

      <!-- أذكار المساء -->
      <section id="azkarEveningSection" class="content-section">
        <div class="section-header">
          <h2><i class="fas fa-moon"></i> أذكار المساء</h2>
        </div>
        <div class="azkar-container" id="eveningContainer"></div>
      </section>

      <!-- الأدعية -->
      <section id="duaSection" class="content-section">
        <div class="section-header">
          <h2><i class="fas fa-hand-praying"></i> الأدعية الجامعة</h2>
        </div>
        <!-- أزرار التصنيف -->
        <div class="filter-tabs" id="duaCategories"></div>
        <div class="dua-container" id="duaContainer"></div>
      </section>

      <!-- الورد اليومي -->
      <section id="dailyWirdSection" class="content-section">
        <div class="section-header">
          <h2><i class="fas fa-book-open"></i> الورد اليومي</h2>
          <button class="reset-wird" id="resetWirdBtn"><i class="fas fa-undo"></i> إعادة ضبط</button>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="wirdProgress" style="width: 0%;">0%</div>
        </div>
        <div class="wird-list" id="wirdListContainer"></div>
      </section>

      <!-- التسبيح الإلكتروني -->
      <section id="tasbeehSection" class="content-section">
        <div class="section-header">
          <h2><i class="fas fa-dharmachakra"></i> المسبحة الإلكترونية</h2>
        </div>
        <div class="tasbeeh-container">
          <select id="tasbeehType" class="tasbeeh-select">
            <option value="سبحان الله">سبحان الله</option>
            <option value="الحمد لله">الحمد لله</option>
            <option value="الله أكبر">الله أكبر</option>
            <option value="لا إله إلا الله">لا إله إلا الله</option>
            <option value="أستغفر الله">أستغفر الله</option>
            <option value="سبحان الله وبحمده">سبحان الله وبحمده</option>
            <option value="اللهم صل وسلم على نبينا محمد">اللهم صل وسلم على نبينا محمد</option>
          </select>
          <div class="tasbeeh-counter" id="tasbeehCount">0</div>
          <button class="tasbeeh-btn" id="tasbeehIncrement"><i class="fas fa-plus-circle"></i></button>
          <div class="tasbeeh-actions">
            <button class="reset-tasbeeh" id="resetTasbeeh"><i class="fas fa-redo-alt"></i> تصفير</button>
          </div>
        </div>
      </section>

      <!-- زر العودة إلى الأعلى (يظهر عند التمرير) -->
      <button id="scrollTopBtn" class="scroll-top-btn" title="العودة للأعلى"><i class="fas fa-arrow-up"></i></button>
    </main>

    <!-- شريط التنقل السفلي (مخصص للموبايل) -->
    <nav class="bottom-nav">
      <div class="nav-item active" data-section="homeSection"><i class="fas fa-home"></i><span>الرئيسية</span></div>
      <div class="nav-item" data-section="azkarMorningSection"><i class="fas fa-sun"></i><span>الصباح</span></div>
      <div class="nav-item" data-section="azkarEveningSection"><i class="fas fa-moon"></i><span>المساء</span></div>
      <!-- تغيير أيقونة الأدعية إلى أيقونة أكثر وضوحاً -->
      <div class="nav-item" data-section="duaSection"><i class="fas fa-hands-praying"></i><span>الأدعية</span></div>
      <div class="nav-item" data-section="dailyWirdSection"><i class="fas fa-book-open"></i><span>الورد</span></div>
      <div class="nav-item" data-section="tasbeehSection"><i class="fas fa-dharmachakra"></i><span>التسبيح</span></div>
    </nav>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ملف البيانات الثابتة (الأذكار، الأدعية...) -->
  <script src="data.js"></script>
  <!-- ملف JavaScript الرئيسي -->
  <script src="script.js"></script>
</body>
</html>
